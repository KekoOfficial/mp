<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHASAM CORE | GATEWAY V10</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41; /* Verde Matrix */
            --secondary: #ff003c; /* Rojo Alerta */
            --bg: #050505;
            --panel: rgba(10, 10, 10, 0.9);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 255, 65, 0.05) 0%, transparent 80%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 100%, 100% 2px, 3px 100%;
            color: var(--primary);
            font-family: 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .gateway-container {
            background: var(--panel);
            padding: 40px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            width: 350px;
            text-align: center;
            position: relative;
        }

        .gateway-container::before {
            content: "SYSTEM STATUS: ACTIVE";
            position: absolute;
            top: -20px;
            left: 10px;
            background: var(--bg);
            padding: 0 10px;
            font-size: 10px;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary);
            letter-spacing: 3px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 10px;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: var(--primary);
            font-family: 'Fira Code', monospace;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .btn-container {
            display: grid;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-family: 'Fira Code', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 15px var(--primary);
        }

        .btn-global {
            border-color: #00e5ff;
            color: #00e5ff;
        }

        .btn-global:hover {
            background: #00e5ff;
            color: black;
            box-shadow: 0 0 15px #00e5ff;
        }

        .footer {
            margin-top: 25px;
            font-size: 9px;
            opacity: 0.5;
        }

        .glitch-text {
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="gateway-container">
        <h1 class="glitch-text">KHASAM CORE</h1>
        
        <form action="/login" method="POST">
            <div class="input-group">
                <label>OPERADOR ID</label>
                <input type="text" name="u" placeholder="Martín Mp / AdminX" required>
            </div>
            
            <div class="input-group">
                <label>ACCESS KEY</label>
                <input type="password" name="p" placeholder="••••••••" required>
            </div>

            <div class="btn-container">
                <button type="submit" name="target" value="admin" class="btn">
                    [ 📡 ] ACCESO PANEL V10
                </button>
                
                <button type="button" onclick="location.href='/chat_global'" class="btn btn-global">
                    [ 💬 ] GLOBAL CHAT (5.9K)
                </button>
            </div>
        </form>

        <div class="footer">
            PROPUESTA DE MARTÍN MP | MP AUTOMATION SYSTEM<br>
            ESTADO: ENCRIPTADO
        </div>
    </div>

</body>
</html>
