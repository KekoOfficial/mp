<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>V10_CHAT_ID_{{ cid }}</title>
    <link rel="stylesheet" href="/static/setchat.css">
</head>
<body>
    <div class="nav-top">OBJETIVO: {{ cid }} <span id="clock"></span></div>
    
    <div id="chat-box">
        </div>

    <div class="input-area">
        <input type="text" id="m" placeholder="Escribir mensaje..." autocomplete="off">
        <button onclick="send()">ENVIAR</button>
    </div>

    <script>
        const cid = "{{ cid }}";
        async function fetchMsgs() {
            const r = await fetch('/api/logs?t=' + Date.now());
            const d = await r.text();
            const box = document.getElementById('chat-box');
            let html = '';

            d.trim().split('\n').forEach(l => {
                const p = l.split('|');
                if (p.length >= 5) {
                    const [plat, info, msg, hora, side] = p;
                    // Filtramos: Mensajes del usuario O respuestas del admin a este usuario
                    if (info.startsWith(cid) || (side === "OUT" && info.includes(cid))) {
                        const tipo = (side === "IN") ? "msg-in" : "msg-out";
                        html += `<div class="msg ${tipo}">
                                    <div class="txt">${msg}</div>
                                    <div class="time">${hora}</div>
                                 </div>`;
                    }
                }
            });
            if (box.innerHTML !== html) {
                box.innerHTML = html;
                box.scrollTop = box.scrollHeight;
            }
        }

        async function send() {
            const m = document.getElementById('m');
            if (!m.value) return;
            await fetch('/api/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: cid, msg: m.value})
            });
            m.value = '';
            fetchMsgs();
        }

        document.getElementById('m').onkeypress = e => { if(e.key=='Enter') send(); };
        setInterval(fetchMsgs, 1500);
        fetchMsgs();
    </script>
</body>
</html>
