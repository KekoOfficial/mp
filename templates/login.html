<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MPSERVER.NET | LOGIN</title>
    <style>
        body { background: #000; color: #00f3ff; font-family: 'Courier New', monospace; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .panel { border: 1px solid #00f3ff; padding: 40px; background: #080808; box-shadow: 0 0 20px #00f3ff55; width: 300px; text-align: center; }
        h1 { font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 30px; }
        input { background: #000; border: 1px solid #00f3ff; color: #fff; padding: 12px; margin: 10px 0; width: 100%; box-sizing: border-box; }
        button { background: #00f3ff; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        .footer { font-size: 0.6rem; margin-top: 20px; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>MPSERVER_NET_v9</h1>
        <form method="POST">
            <input type="text" name="u" placeholder="OPERADOR_ID" required>
            <input type="password" name="p" placeholder="PASSWORD" required>
            <button type="submit">ENTRAR AL SISTEMA</button>
        </form>
        <div class="footer">ACCESO RESTRINGIDO - IMPERIO IMP</div>
    </div>
</body>
</html>
