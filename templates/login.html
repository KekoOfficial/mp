<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IMPERIO IMP - LOGIN</title>
    <style>
        body { background: #000; color: #00f3ff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #00f3ff; padding: 40px; background: #050505; box-shadow: 0 0 30px rgba(0,243,255,0.4); border-radius: 8px; text-align: center; }
        input { background: #000; border: 1px solid #00f3ff; color: #fff; padding: 15px; margin: 10px 0; width: 100%; box-sizing: border-box; outline: none; }
        button { background: #00f3ff; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        .glitch { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="glitch">IMPERIO_IMP_v8</div>
        <form method="POST">
            <input type="text" name="username" placeholder="OPERADOR_ID" required>
            <input type="password" name="password" placeholder="ACCESS_KEY" required>
            <button type="submit">DESBLOQUEAR NÚCLEO</button>
        </form>
    </div>
</body>
</html>
