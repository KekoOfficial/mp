<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="header"><div class="brand">MPSERVER CHATS</div></div>
    
    <div style="padding:15px;">
        <h3 style="color:#00d2ff;">🔹 TELEGRAM</h3>
        <div id="list-tg"></div>

        <h3 style="color:#e1306c; margin-top:20px;">🔸 INSTAGRAM</h3>
        <div id="list-ig"></div>
    </div>

    <script>
        async function load() {
            const res = await fetch("/logs");
            const data = await res.json();
            const tg = document.getElementById("list-tg");
            const ig = document.getElementById("list-ig");
            let uTG = {}, uIG = {};

            data.logs.forEach(line => {
                const [plat, user, msg, hora] = line.split('|');
                if(user === "YO") return;
                const [id, name] = user.split(':');
                if(plat === "TG") uTG[id] = {name, msg};
                if(plat === "IG") uIG[id] = {name, msg};
            });

            tg.innerHTML = Object.entries(uTG).map(([id, u]) => 
                `<div class="chat-item" onclick="openChat('${id}','${u.name}')"><b>${u.name}</b><br><small>${u.msg.substring(0,30)}</small></div>`).join('');
            
            ig.innerHTML = Object.entries(uIG).map(([id, u]) => 
                `<div class="chat-item" style="border-left:4px solid #e1306c" onclick="openChat('${id}','${u.name}')"><b>${u.name}</b><br><small>${u.msg.substring(0,30)}</small></div>`).join('');
        }
        function openChat(id, name){
            localStorage.setItem("cid", id); localStorage.setItem("cname", name);
            window.location.href="/";
        }
        load();
    </script>
</body>
</html>
