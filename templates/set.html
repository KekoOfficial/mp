<link rel="stylesheet" href="/static/style.css">
<div class="header"><b>SET TELEGRAM</b></div>
<div class="tabs">
    <button class="active" onclick="location.href='/settings'">TELEGRAM</button>
    <button onclick="location.href='/setig'">INSTAGRAM</button>
</div>
<div id="lista" class="list-container"></div>

<script>
    async function cargar() {
        const res = await fetch("/logs");
        const data = await res.json();
        const box = document.getElementById("lista");
        let users = {};

        data.logs.forEach(line => {
            const [plat, user, msg, hora] = line.split('|');
            if(plat === "TG" && user !== "YO") {
                const [id, name] = user.split(':');
                users[id] = {name, msg, hora};
            }
        });

        box.innerHTML = Object.entries(users).map(([id, u]) => `
            <div class="card" onclick="openChat('${id}','${u.name}')">
                <b>${u.name}</b><br><small>${u.msg}</small>
            </div>
        `).join('');
    }
    function openChat(id, name) {
        localStorage.setItem("cid", id); localStorage.setItem("cname", name);
        window.location.href="/chatelegram";
    }
    cargar(); setInterval(cargar, 5000);
</script>
