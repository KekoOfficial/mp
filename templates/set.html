<link rel="stylesheet" href="/static/style.css">
<div class="header"><b>MPSERVER 🔹 TELEGRAM</b></div>

<div class="menu-tabs">
    <button class="active" onclick="location.href='/settings'">TELEGRAM</button>
    <button onclick="location.href='/setig'">INSTAGRAM</button>
</div>

<div id="list-tg" class="chat-list"></div>

<script>
    async function loadTG() {
        const res = await fetch("/logs");
        const data = await res.json();
        const list = document.getElementById("list-tg");
        let users = {};

        data.logs.forEach(line => {
            const [plat, user, msg, hora] = line.split('|');
            if(plat === "TG" && user !== "YO") {
                const [id, name] = user.split(':');
                users[id] = {name, msg, hora};
            }
        });

        list.innerHTML = Object.entries(users).map(([id, u]) => `
            <div class="chat-item" onclick="openTG('${id}','${u.name}')">
                <b>${u.name}</b><br><small>${u.msg}</small>
            </div>
        `).join('');
    }
    function openTG(id, name) {
        localStorage.setItem("cid", id); localStorage.setItem("cname", name);
        window.location.href="/chatelegram";
    }
    loadTG(); setInterval(loadTG, 5000);
</script>
