<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MPSERVER | SELECTOR V10</title>
    <link rel="stylesheet" href="/static/set.css">
</head>
<body>
    <div class="header">
        <div class="glitch">IMPERIO_IMP_V10</div>
        <div class="status">OPERADOR: {{ user }} | GLOBAL_LINK: ACTIVE</div>
    </div>

    <div id="chat-list" class="container">
        </div>

    <script>
        async function loadChats() {
            try {
                const r = await fetch('/api/logs?t=' + Date.now());
                const data = await r.text();
                const list = document.getElementById('chat-list');
                const users = {};

                data.trim().split('\n').forEach(line => {
                    const parts = line.split('|');
                    if (parts.length >= 5) {
                        const [plat, info, msg, hora, side] = parts;
                        if (side === "IN") {
                            users[info] = { msg, hora };
                        }
                    }
                });

                list.innerHTML = '';
                Object.keys(users).reverse().forEach(u => {
                    const [id, name] = u.split(':');
                    list.innerHTML += `
                        <div class="chat-card" onclick="location.href='/chat/${id}'">
                            <div class="info">
                                <span class="name">${name}</span>
                                <span class="last-msg">${users[u].msg.substring(0, 30)}...</span>
                            </div>
                            <div class="meta">${users[u].hora}</div>
                        </div>`;
                });
            } catch (e) { console.log("Error sync..."); }
        }
        setInterval(loadChats, 2000);
        loadChats();
    </script>
</body>
</html>
