<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OMEGA_SELECTOR</title>
    <style>
        :root { --cyan: #00f3ff; --dark: #050505; }
        body { background: var(--dark); color: #fff; font-family: sans-serif; margin: 0; }
        .header { background: #000; padding: 20px; border-bottom: 2px solid var(--cyan); text-align: center; }
        .chat-list { padding: 20px; display: grid; gap: 15px; max-width: 800px; margin: auto; }
        .chat-card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; transition: 0.3s; }
        .chat-card:hover { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,243,255,0.2); transform: scale(1.02); }
        .user-info .name { display: block; font-size: 18px; color: var(--cyan); font-weight: bold; }
        .user-info .msg { color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header"><h1>CORE_SELECTOR_v8</h1></div>
    <div id="list" class="chat-list"></div>

    <script>
        async function update() {
            const res = await fetch('/get_logs');
            const data = await res.text();
            const lines = data.trim().split('\n');
            const unique = {};
            lines.forEach(l => {
                const [p, u, m, h] = l.split('|');
                if(p === 'TG' && u !== 'YO') unique[u] = {m, h};
            });
            const list = document.getElementById('list');
            list.innerHTML = '';
            for(let u in unique) {
                const [id, name] = u.split(':');
                list.innerHTML += `
                    <div class="chat-card" onclick="location.href='/chat/${id}'">
                        <div class="user-info">
                            <span class="name">${name}</span>
                            <span class="msg">${unique[u].m}</span>
                        </div>
                        <div style="color:#444">${unique[u].h}</div>
                    </div>`;
            }
        }
        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
