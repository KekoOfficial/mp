<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <h2 style="flex:1; margin:0;">WhatsApp</h2>
        <span>🔍</span> <span onclick="window.location.href='/perfil'">⋮</span>
    </header>

    <main class="chat-list" id="chat-list"></main>

    <div class="fab" onclick="window.location.href='/grupos'">➕</div>

    <script>
        async function load() {
            const res = await fetch("/logs");
            const data = await res.json();
            const list = document.getElementById("chat-list");
            const users = {};

            data.logs.forEach(line => {
                const [id, rest] = line.split('|');
                if(rest) users[id] = { name: rest.split(':')[0], msg: rest.split(':')[1] || "..." };
            });

            list.innerHTML = Object.entries(users).map(([id, u]) => `
                <div class="chat-item" onclick="select('${id}', '${u.name}')">
                    <img src="/static/avatars/${id}.jpg" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=${u.name}&background=3b4a54&color=fff'">
                    <div style="flex:1">
                        <div style="display:flex; justify-content:space-between"><b>${u.name}</b> <small>10:00</small></div>
                        <div style="color:var(--wa-text-dim); font-size:0.9rem">${u.msg}</div>
                    </div>
                </div>
            `).join('');
        }
        function select(id, name) {
            localStorage.setItem("selectedChatId", id);
            localStorage.setItem("selectedChatName", name);
            window.location.href = "/";
        }
        window.onload = load;
    </script>
</body>
</html>
