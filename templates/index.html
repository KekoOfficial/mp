<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-window">
        <header class="header">
            <a href="/settings" class="back-btn">←</a>
            <img id="h-avatar" class="avatar" style="width:40px; height:40px;">
            <div style="flex:1"><b id="h-name">Nombre</b><br><small>en línea</small></div>
        </header>

        <div class="messages-container" id="msgs"></div>

        <footer class="input-area">
            <div class="input-card">
                <span>😊</span>
                <textarea id="msg-input" placeholder="Mensaje" rows="1"></textarea>
                <span>📎</span>
            </div>
            <button id="send-btn" onclick="send()">➤</button>
        </footer>
    </div>

    <script>
        const chatId = localStorage.getItem("selectedChatId");
        const chatName = localStorage.getItem("selectedChatName");

        async function fetchMsgs() {
            const res = await fetch("/logs");
            const data = await res.json();
            const filtered = data.logs.filter(l => l.startsWith(chatId + "|"));
            document.getElementById("msgs").innerHTML = filtered.map(l => `
                <div class="msg-row"><div class="msg-bubble">${l.split(': ')[1]}</div></div>
            `).join('');
            const d = document.getElementById("msgs"); d.scrollTop = d.scrollHeight;
        }

        async function send() {
            const input = document.getElementById("msg-input");
            if(!input.value.trim()) return;
            await fetch("/send", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({id: chatId, msg: input.value})
            });
            input.value = ""; fetchMsgs();
        }

        window.onload = () => {
            if(!chatId) return window.location.href="/settings";
            document.getElementById("h-name").innerText = chatName;
            document.getElementById("h-avatar").src = `/static/avatars/${chatId}.jpg`;
            fetchMsgs(); setInterval(fetchMsgs, 3000);
        }
    </script>
</body>
</html>
