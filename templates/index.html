<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEGRAM PANEL | CHAT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="/settings" class="nav-btn" title="Ajustes">◀️</a>
            <h2>CHATS</h2>
        </div>
        <div class="chat-list" id="chat-list">
            </div>
    </aside>

    <main class="chat-area">
        <header class="chat-header">
            <div id="selected-chat-info">
                <span id="chat-name">Selecciona un chat</span>
                <small id="chat-id">ID: ---</small>
            </div>
        </header>

        <div class="messages-container" id="log-display">
            <div class="empty-state">Tus mensajes aparecerán aquí</div>
        </div>

        <footer class="input-area">
            <input type="hidden" id="current-id">
            <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
            <button onclick="sendMessage()" id="send-btn">
                <span>➤</span>
            </button>
        </footer>
    </main>
</div>

<script>
let logsData = [];

async function fetchData() {
    try {
        const res = await fetch("/logs");
        const data = await res.json();
        logsData = data.logs;
        renderChatList();
        renderMessages();
    } catch (e) { console.error("Error sync:", e); }
}

function renderChatList() {
    const listDiv = document.getElementById("chat-list");
    const uniqueUsers = {};

    logsData.forEach(line => {
        const [id, rest] = line.split('|');
        if(rest) {
            const name = rest.split(':')[0];
            uniqueUsers[id] = name;
        }
    });

    const activeId = document.getElementById("current-id").value;
    listDiv.innerHTML = "";
    
    for (const [id, name] of Object.entries(uniqueUsers)) {
        const item = document.createElement("div");
        item.className = `chat-item ${id === activeId ? 'active' : ''}`;
        item.onclick = () => {
            document.getElementById("current-id").value = id;
            document.getElementById("chat-name").innerText = name;
            document.getElementById("chat-id").innerText = "ID: " + id;
            renderChatList();
            renderMessages();
        };
        item.innerHTML = `<strong>${name}</strong><br><small>${id}</small>`;
        listDiv.appendChild(item);
    }
}

function renderMessages() {
    const display = document.getElementById("log-display");
    const activeId = document.getElementById("current-id").value;
    
    if(!activeId) return;

    const filtered = logsData.filter(line => line.startsWith(activeId + "|"));
    display.innerHTML = filtered.map(line => {
        const msg = line.split(': ')[1] || "";
        return `<div class="msg-row"><div class="msg-bubble">${msg}</div></div>`;
    }).join("");
    
    display.scrollTop = display.scrollHeight;
}

async function sendMessage() {
    const id = document.getElementById("current-id").value;
    const input = document.getElementById("msg-input");
    if(!id || !input.value.trim()) return;

    await fetch("/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id, msg: input.value})
    });

    input.value = "";
    fetchData();
}

setInterval(fetchData, 3000);
window.onload = fetchData;
</script>
</body>
</html>
