<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="display:flex; flex-direction:column; height:100vh;">
    <div class="header">
        <span onclick="location.href='/settings'" style="cursor:pointer; margin-right:15px;">◀</span>
        <b id="chat-name"> Cargando...</b>
    </div>

    <div id="msgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>

    <div class="input-area">
        <input id="in" placeholder="Escribe un mensaje...">
        <button onclick="enviar()">➤</button>
    </div>

    <script>
        const cid = localStorage.getItem("cid");
        document.getElementById("chat-name").innerText = localStorage.getItem("cname");

        async function update() {
            const res = await fetch("/logs");
            const data = await res.json();
            const box = document.getElementById("msgs");
            
            box.innerHTML = data.logs.filter(l => l.includes(cid) || l.includes("|YO|")).map(line => {
                const [plat, user, msg, hora] = line.split('|');
                const isMe = user === "YO";
                const align = isMe ? "align-self:flex-end; background:#005c4b;" : "align-self:flex-start; background:#222;";
                
                let content = msg;
                if(msg.startsWith("IMG:")) content = `<img src="${msg.split(':')[1]}" style="width:100%; border-radius:8px;">`;
                if(msg.startsWith("VID:")) content = `<video src="${msg.split(':')[1]}" controls style="width:100%; border-radius:8px;"></video>`;

                return `<div style="${align} color:white; padding:10px; margin:5px; border-radius:12px; max-width:75%; border:1px solid #333;">
                    ${content} <br><small style="font-size:9px; opacity:0.5; float:right; margin-top:5px;">${hora}</small>
                </div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function enviar() {
            const val = document.getElementById("in").value;
            if(!val) return;
            await fetch("/send", {
                method:"POST", 
                headers:{"Content-Type":"application/json"}, 
                body:JSON.stringify({id:cid, msg:val})
            });
            document.getElementById("in").value = "";
            update();
        }
        setInterval(update, 3000); update();
    </script>
</body>
</html>
