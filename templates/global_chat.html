<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MP | GLOBAL STREAM 5.9K</title>
    <style>
        :root { --neon: #00e5ff; --bg: #020202; }
        body { 
            background: var(--bg); 
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            overflow: hidden;
        }
        .header {
            background: #0a0a0a;
            padding: 10px 20px;
            border-bottom: 1px solid var(--neon);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats { font-size: 12px; color: #fff; }
        
        #stream-container {
            height: 85vh;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
        }

        .node-entry {
            border-left: 2px solid var(--neon);
            margin: 5px 0;
            padding: 10px;
            background: rgba(0, 229, 255, 0.03);
            animation: fadeIn 0.3s ease-out;
        }

        .node-entry .meta { font-size: 10px; color: #555; }
        .node-entry .user { font-weight: bold; color: #fff; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <span style="font-size: 20px;">🌐 GLOBAL CHAT ENGINE</span><br>
            <span class="stats">NÚCLEO: BOT2.PY | MIEMBROS: 5,975</span>
        </div>
        <div style="text-align: right;">
            <span style="color:red">● LIVE</span><br>
            <small>PROPUESTA DE MARTÍN MP</small>
        </div>
    </div>

    <div id="stream-container">
        <div class="node-entry">
            <div class="meta">[UTC-4] SERVER_READY</div>
            <div class="user">SISTEMA</div>
            <div class="msg">Esperando flujo de datos de los 5,975 nodos...</div>
        </div>
    </div>

</body>
</html>
