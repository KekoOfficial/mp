<link rel="stylesheet" href="/static/style.css">
<div class="header"><span onclick="location.href='/settings'">◀</span> <b id="chat-name"></b></div>
<div id="msgs" class="messages-container"></div>
<div class="input-area">
    <input id="in" placeholder="Responder Telegram...">
    <button onclick="enviar()">➤</button>
</div>

<script>
    const cid = localStorage.getItem("cid");
    document.getElementById("chat-name").innerText = localStorage.getItem("cname");

    async function update() {
        const res = await fetch("/logs");
        const data = await res.json();
        const box = document.getElementById("msgs");
        
        box.innerHTML = data.logs.filter(l => (l.includes(cid) || l.includes("|YO|")) && l.startsWith("TG")).map(line => {
            const [plat, user, msg, hora] = line.split('|');
            const isMe = user === "YO";
            const side = isMe ? "me" : "them";
            return `<div class="bubble ${side}">${msg}<br><small>${hora}</small></div>`;
        }).join('');
        box.scrollTop = box.scrollHeight;
    }
    async function enviar() {
        const val = document.getElementById("in").value;
        if(!val) return;
        await fetch("/send", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id:cid, msg:val, plat:"TG"})});
        document.getElementById("in").value = ""; update();
    }
    setInterval(update, 3000); update();
</script>
