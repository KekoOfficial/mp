<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MP | LOGIN GLOBAL 5.9K</title>
    <style>
        body { background: #000; color: #00e5ff; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #00e5ff; padding: 30px; background: rgba(0, 229, 255, 0.05); text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #00e5ff; color: #fff; box-sizing: border-box; }
        .btn-mp { width: 100%; padding: 10px; background: #00e5ff; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .header-text { font-size: 14px; margin-bottom: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="header-text">SISTEMA GLOBAL MP<br>5,975 MIEMBROS</div>
        <form action="/auth_global" method="POST">
            <input type="text" name="user_id" placeholder="ID DE TELEGRAM" required>
            <input type="password" name="access_code" placeholder="CÓDIGO DE ACCESO" required>
            <button type="submit" class="btn-mp">ENTRAR AL CHAT</button>
        </form>
        <p style="font-size: 9px; margin-top: 15px;">PROPIEDAD DE MARTÍN MP</p>
    </div>
</body>
</html>
